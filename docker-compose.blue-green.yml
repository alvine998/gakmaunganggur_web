services:
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "3080:80"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped

  web-blue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://kerjaajadulu.com}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3080
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://kerjaajadulu.com}
    expose:
      - "3080"
    restart: unless-stopped

  web-green:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://kerjaajadulu.com}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3080
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://kerjaajadulu.com}
    expose:
      - "3080"
    restart: unless-stopped
